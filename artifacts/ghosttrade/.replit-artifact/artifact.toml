kind = "web"
previewPath = "/"
title = "GhostTrade Private"
version = "1.0.0"
id = "artifacts/ghosttrade"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20229

[services.development]
run = "pnpm --filter @workspace/ghosttrade run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ghosttrade", "run", "build" ]
publicDir = "artifacts/ghosttrade/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20229"
BASE_PATH = "/"
